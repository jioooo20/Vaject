# =============================================================================
# Container Scan — Trivy Image Scan
# =============================================================================
# Setelah Docker image dibangun, scan image tersebut untuk mencari
# OS-level vulnerabilities di base image (nginx:alpine) dan juga
# dependency yang terbawa ke dalam image.
#
# Tool:  Trivy — vulnerability scanner untuk container images
#         Menggunakan database: NVD + GHSA + OSV
# Output: SARIF → GitHub Code Scanning
# =============================================================================

name: Container Scan — Trivy Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: vaject:${{ github.sha }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: vaject:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Trivy Image Summary (Table)
        if: always()
        run: |
          trivy image --severity HIGH,CRITICAL --ignore-unfixed \
            --format table vaject:${{ github.sha }} || true
