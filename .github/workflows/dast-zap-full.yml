# =============================================================================
# DAST — OWASP ZAP Full Active Scan (Scheduled)
# =============================================================================
# Full active scan mingguan untuk pengujian keamanan yang lebih masif.
# Berbeda dengan baseline scan (passive), full scan akan:
#   1. Spider — merayapi seluruh halaman aplikasi
#   2. Ajax Spider — merayapi konten JavaScript-heavy
#   3. Active Scan — mengirimkan attack payloads ke aplikasi
#
# Ini adalah simulasi serangan nyata. Hanya jalankan di environment
# staging/testing, BUKAN di production!
#
# Schedule: Setiap hari Senin jam 02:00 UTC (09:00 WIB)
# =============================================================================

name: DAST — ZAP Full Scan (Scheduled)

on:
  schedule:
    # Setiap hari Senin jam 02:00 UTC = 09:00 WIB
    - cron: '0 2 * * 1'
  # Juga bisa di-trigger manual
  workflow_dispatch:

jobs:
  zap-full-scan:
    name: ZAP Full Active Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: vaject-zap-full:${{ github.sha }}

      - name: Start application container
        run: |
          docker run -d --name vaject-app-full -p 8081:80 vaject-zap-full:${{ github.sha }}

      - name: Wait for application to be ready
        run: |
          echo "Menunggu aplikasi siap di http://localhost:8081 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081 > /dev/null 2>&1; then
              echo "Aplikasi siap!"
              exit 0
            fi
            echo "  Menunggu... ($i/30)"
            sleep 2
          done
          echo "Aplikasi tidak siap setelah 60 detik"
          exit 1

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: 'http://localhost:8081'
          rules_file_name: '.zap/rules.tsv'
          # -a: include alpha active scan rules
          cmd_options: '-a'
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: zap-full-scan-report

      - name: Stop application container
        if: always()
        run: docker stop vaject-app-full && docker rm vaject-app-full
