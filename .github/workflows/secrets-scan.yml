# =============================================================================
# Secrets Scan — Gitleaks
# =============================================================================
# Mendeteksi hardcoded credentials, API keys, tokens, password, dan
# sensitive information lainnya di dalam repository.
#
# Tool: Gitleaks — MIT License
#   - Scan full git history (bukan hanya latest commit)
#   - Deteksi 150+ pattern secrets bawaan
#   - Support custom rules
# =============================================================================

name: Secrets Scan — Gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source code (full history)
        uses: actions/checkout@v7
        with:
          # fetch-depth: 0 diperlukan untuk scan full git history
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: optional untuk versi enterprise
