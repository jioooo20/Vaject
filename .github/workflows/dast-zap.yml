# =============================================================================
# DAST — OWASP ZAP Baseline Scan
# =============================================================================
# Dynamic Application Security Testing (DAST) menggunakan OWASP ZAP.
# Melakukan passive scan terhadap aplikasi yang sedang berjalan untuk
# memeriksa:
#   - Security headers (CSP, HSTS, X-Frame-Options, dll)
#   - XSS reflection
#   - Informasi sensitif di response
#   - CORS misconfiguration
#   - SSL/TLS issues
#
# Karena Vaject adalah static site (Nginx), fokus DAST adalah pada
# konfigurasi keamanan server, bukan pada logika aplikasi.
#
# Tool: OWASP ZAP (Zed Attack Proxy) — Apache 2.0
# Mode: Baseline (passive scanning) — cepat, non-invasif
# =============================================================================

name: DAST — ZAP Baseline Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: vaject-zap:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start application container
        run: |
          docker run -d --name vaject-app -p 8080:80 vaject-zap:${{ github.sha }}

      - name: Wait for application to be ready
        run: |
          echo "Menunggu aplikasi siap di http://localhost:8080 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Aplikasi siap!"
              exit 0
            fi
            echo "  Menunggu... ($i/30)"
            sleep 2
          done
          echo "Aplikasi tidak siap setelah 60 detik"
          exit 1

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:8080'
          # Gunakan rules file untuk mengelola false positive
          rules_file_name: '.zap/rules.tsv'
          # -a: include alpha passive scan rules
          # -I: jangan fail pada WARNING, hanya FAIL/ERROR
          cmd_options: '-a -I'
          # Token untuk issue management (opsional)
          token: ${{ secrets.GITHUB_TOKEN }}
          # Nama artifact
          artifact_name: zap-baseline-report

      - name: Stop application container
        if: always()
        run: docker stop vaject-app && docker rm vaject-app
