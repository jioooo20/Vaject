# =============================================================================
# PR Comment — Security Report di Pull Request
# =============================================================================
# Secara otomatis memposting ringkasan hasil security scan sebagai
# comment di Pull Request. Comment akan di-update (bukan duplikat)
# setiap kali ada push baru ke PR.
#
# Fungsi:
#   - Post ringkasan severity breakdown
#   - Tampilkan top 5 findings paling fatal
#   - Link ke HTML report artifact
#
# Trigger: Hanya untuk pull_request event
# =============================================================================

name: PR Comment — Security Summary

on:
  workflow_run:
    workflows: ["Security Pipeline"]
    types:
      - completed

jobs:
  pr-comment:
    name: Post Security Summary to PR
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'

    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - name: Download findings.json artifact
        uses: actions/download-artifact@v8
        with:
          name: findings-json
          path: /tmp/report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Generate PR comment
        id: generate-comment
        run: |
          python3 .github/scripts/generate-pr-comment.py \
            --run-id ${{ github.event.workflow_run.id }} \
            --repo ${{ github.repository }} \
            > /tmp/comment.txt

      - name: Find PR number
        id: find-pr
        uses: actions/github-script@v9
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const prs = run.data.pull_requests;
            if (prs && prs.length > 0) {
              core.setOutput('pr_number', prs[0].number.toString());
            } else {
              core.setOutput('pr_number', '');
            }

      - name: Post or update PR comment
        if: steps.find-pr.outputs.pr_number != ''
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');
            const fs = require('fs');
            const commentBody = fs.readFileSync('/tmp/comment.txt', 'utf8');

            // Cari comment yang sudah ada dari workflow ini
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Security Scan Report')
            );

            if (botComment) {
              // Update comment yang sudah ada
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              // Buat comment baru
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }
